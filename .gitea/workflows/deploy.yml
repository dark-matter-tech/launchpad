name: Deploy

on:
  push:
    branches: [staging]

jobs:
  notify-downstream:
    name: Update downstream repos
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Trigger rockit-compiler submodule update (GitHub)
        if: env.GH_PAT != ''
        run: |
          curl -s -X POST \
            -H "Authorization: token ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/dark-matter-tech/rockit-compiler/dispatches" \
            -d '{"event_type":"launchpad-updated","client_payload":{"ref":"${{ github.sha }}"}}'
          echo "Dispatched submodule update to rockit-compiler (GitHub)"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Trigger rockit-compiler submodule update (Gitea)
        run: |
          API="${GITHUB_SERVER_URL}/api/v1"
          curl -s -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            "${API}/repos/Dark-Matter/rockit-compiler/dispatches" \
            -d '{"event_type":"launchpad-updated","client_payload":{"ref":"${{ github.sha }}"}}'
          echo "Dispatched submodule update to rockit-compiler (Gitea)"
        env:
          GITHUB_TOKEN: ${{ gitea.token }}
