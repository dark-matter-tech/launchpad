name: CI

on:
  push:
  pull_request:
    branches: [develop, beta, master, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate stdlib modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check all modules present
        run: |
          EXPECTED="collections math strings result uuid file path http ws url base64 xml json datetime probe"
          MISSING=0
          for mod in $EXPECTED; do
            FOUND=$(find rockit -name "${mod}.rok" | head -1)
            if [ -z "$FOUND" ]; then
              echo "MISSING: ${mod}.rok"
              MISSING=$((MISSING + 1))
            else
              echo "OK: $FOUND"
            fi
          done
          [ "$MISSING" -eq 0 ] || exit 1

      - name: Check for syntax errors (basic)
        run: |
          ERRORS=0
          for f in $(find rockit -name "*.rok"); do
            if ! head -1 "$f" > /dev/null 2>&1; then
              echo "ERROR: $f is not readable"
              ERRORS=$((ERRORS + 1))
            fi
          done
          echo "Checked $(find rockit -name '*.rok' | wc -l) files"
          [ "$ERRORS" -eq 0 ] || exit 1
