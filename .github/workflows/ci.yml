name: Validate stdlib modules

on:
  push:
  pull_request:
    branches: [develop, beta, master, staging]

jobs:
  validate:
    name: Build & Test
    runs-on: ubuntu-22.04
    container: wrightwingman/rockit-compiler:rc
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout stdlib
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${GITHUB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git clone --depth 1 --branch "${BRANCH}" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" .
          echo "  Checked out: ${BRANCH} ($(git rev-parse --short HEAD))"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Validate module structure
        run: |
          echo ""
          echo "┌─────────────────────────────────────────────┐"
          echo "│  Stage 2 — Validate Module Structure         │"
          echo "└─────────────────────────────────────────────┘"
          echo ""
          PASS=0; FAIL=0
          MODULES=(
            "rockit/core/collections.rok"
            "rockit/core/math.rok"
            "rockit/core/strings.rok"
            "rockit/core/result.rok"
            "rockit/core/uuid.rok"
            "rockit/encoding/base64.rok"
            "rockit/encoding/json.rok"
            "rockit/encoding/xml.rok"
            "rockit/filesystem/file.rok"
            "rockit/filesystem/path.rok"
            "rockit/networking/http.rok"
            "rockit/networking/url.rok"
            "rockit/networking/websocket.rok"
            "rockit/testing/probe.rok"
            "rockit/time/datetime.rok"
          )
          for mod in "${MODULES[@]}"; do
            if [ -f "$mod" ]; then
              printf "    %-45s %s\n" "$mod" "present"
              PASS=$((PASS + 1))
            else
              printf "    %-45s %s\n" "$mod" "MISSING"
              FAIL=$((FAIL + 1))
            fi
          done
          echo ""
          echo "  Modules: $PASS present, $FAIL missing (${#MODULES[@]} expected)"
          [ "$FAIL" -eq 0 ] || exit 1
          echo ""

      - name: Validate test coverage
        run: |
          echo ""
          echo "┌─────────────────────────────────────────────┐"
          echo "│  Stage 3 — Validate Test Files               │"
          echo "└─────────────────────────────────────────────┘"
          echo ""
          PASS=0; FAIL=0
          TESTS=(
            "tests/core/test_collections.rok"
            "tests/core/test_math.rok"
            "tests/core/test_strings.rok"
            "tests/core/test_result.rok"
            "tests/core/test_uuid.rok"
            "tests/encoding/test_base64.rok"
            "tests/encoding/test_json.rok"
            "tests/encoding/test_xml.rok"
            "tests/filesystem/test_file.rok"
            "tests/filesystem/test_path.rok"
            "tests/networking/test_http.rok"
            "tests/networking/test_url.rok"
            "tests/networking/test_websocket.rok"
            "tests/testing/test_probe.rok"
            "tests/time/test_datetime.rok"
          )
          for t in "${TESTS[@]}"; do
            if [ -f "$t" ]; then
              printf "    %-45s %s\n" "$t" "present"
              PASS=$((PASS + 1))
            else
              printf "    %-45s %s\n" "$t" "MISSING"
              FAIL=$((FAIL + 1))
            fi
          done
          echo ""
          echo "  Tests: $PASS present, $FAIL missing (${#TESTS[@]} expected)"
          [ "$FAIL" -eq 0 ] || exit 1
          echo ""

      - name: Run test suites
        run: |
          echo ""
          echo "┌─────────────────────────────────────────────┐"
          echo "│  Stage 4 — Run Test Suites                   │"
          echo "└─────────────────────────────────────────────┘"
          echo ""
          TOTAL_START=$(date +%s)
          SCHEMES=("core" "encoding" "networking" "time")
          SCHEME_PASS=0; SCHEME_FAIL=0

          for scheme in "${SCHEMES[@]}"; do
            echo "  ── $scheme ──────────────────────────────────"
            START=$(date +%s)
            if rockit test --scheme "$scheme" 2>&1; then
              END=$(date +%s)
              echo "    $scheme passed ($((END - START))s)"
              SCHEME_PASS=$((SCHEME_PASS + 1))
            else
              END=$(date +%s)
              echo "    $scheme FAILED ($((END - START))s)"
              SCHEME_FAIL=$((SCHEME_FAIL + 1))
            fi
            echo ""
          done

          TOTAL_END=$(date +%s)
          TOTAL_ELAPSED=$((TOTAL_END - TOTAL_START))
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ "$SCHEME_FAIL" -eq 0 ]; then
            echo "  All ${SCHEME_PASS} test schemes passed (${TOTAL_ELAPSED}s)"
          else
            echo "  ${SCHEME_FAIL}/${#SCHEMES[@]} schemes FAILED (${TOTAL_ELAPSED}s)"
            exit 1
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
