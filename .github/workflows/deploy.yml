name: Deploy

on:
  push:
    branches: [staging]

jobs:
  notify-downstream:
    name: Update downstream repos
    runs-on: ubuntu-latest
    steps:
      - name: Trigger rockit-compiler submodule update
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/dark-matter-tech/rockit-compiler/dispatches" \
            -d '{"event_type":"launchpad-updated","client_payload":{"ref":"${{ github.sha }}"}}'
          echo "Dispatched submodule update to rockit-compiler"
