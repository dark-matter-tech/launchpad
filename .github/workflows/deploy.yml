name: Deploy stdlib

on:
  push:
    branches: [master, staging]
  workflow_dispatch:

jobs:
  deploy-wiki:
    name: Deploy Wiki
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy wiki pages
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Deploying Wiki Pages"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          if [ ! -d "wiki" ]; then
            echo "  No wiki/ directory found — skipping"
            exit 0
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          WIKI_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git"
          if git clone --depth 1 "$WIKI_URL" /tmp/wiki 2>/dev/null; then
            echo "  Cloned existing wiki"
          else
            echo "  Initializing new wiki repo"
            mkdir -p /tmp/wiki
            cd /tmp/wiki && git init && cd -
          fi

          cp wiki/*.md /tmp/wiki/
          cd /tmp/wiki

          git add -A
          if git diff --cached --quiet; then
            echo "  Wiki is up to date — no changes"
          else
            CHANGED=$(git diff --cached --name-only | wc -l)
            git commit -m "Update wiki pages (${CHANGED} files changed)"
            git push "$WIKI_URL" HEAD:master
            echo "  Deployed ${CHANGED} wiki page(s)"
          fi
          echo ""
        env:
          GITHUB_TOKEN: ${{ github.token }}

  notify-compiler:
    name: Notify Compiler
    runs-on: ubuntu-22.04
    steps:
      - name: Dispatch submodule update to rockit-compiler
        if: env.GH_PAT != ''
        run: |
          curl -s -X POST \
            -H "Authorization: token ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/dark-matter-tech/rockit-compiler/dispatches" \
            -d '{"event_type":"launchpad-updated","client_payload":{"ref":"${{ github.sha }}"}}'
          echo "Dispatched submodule update to rockit-compiler"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
