name: Interop Tests

on:
  push:
  pull_request:
    branches: [develop, beta, master, staging]
  workflow_dispatch:

jobs:
  h2c-interop:
    name: HTTP/2 h2c Interop
    runs-on: ubuntu-22.04
    container: swift:5.10.1-jammy
    defaults:
      run:
        shell: bash

    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            git libssl-dev pkg-config golang-go
          if ! command -v clang > /dev/null 2>&1; then
            apt-get install -y --no-install-recommends clang-15
            ln -sf /usr/bin/clang-15 /usr/bin/clang
          fi
          apt-get clean && rm -rf /var/lib/apt/lists/*
          echo "Go version: $(go version)"

      - name: Checkout stdlib
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${GITHUB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git clone --depth 1 --branch "${BRANCH}" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" .
          echo "Checked out: ${BRANCH} ($(git rev-parse --short HEAD))"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build compiler
        run: |
          git clone --depth 1 https://github.com/dark-matter-tech/rockit-booster.git /tmp/stage0
          cd /tmp/stage0 && swift build -c release 2>&1
          git clone --depth 1 --recurse-submodules https://github.com/dark-matter-tech/rockit-compiler.git /tmp/compiler
          cd /tmp/compiler
          ROCKIT=/tmp/stage0/.build/release/rockit
          bash src/build.sh
          $ROCKIT build-native src/command.rok
          bash runtime/rockit/build.sh
          cd -
          cp /tmp/compiler/src/command /usr/local/bin/rockit
          chmod +x /usr/local/bin/rockit

      - name: Download Go dependencies
        run: |
          cd interop/go && go mod download

      - name: Run interop tests
        run: |
          echo ""
          echo "┌─────────────────────────────────────────────┐"
          echo "│  HTTP/2 h2c Interop Tests                    │"
          echo "└─────────────────────────────────────────────┘"
          echo ""
          rockit test tests/networking/test_http2_interop.rok 2>&1
          echo ""
